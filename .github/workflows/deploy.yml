name: 🚀 Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: ✅ Check Required Secrets
        run: |
          echo "=== Проверка secrets ==="
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "❌ Ошибка: SERVER_HOST secret не настроен"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then
            echo "❌ Ошибка: SERVER_USER secret не настроен"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "❌ Ошибка: SERVER_SSH_KEY secret не настроен"
            exit 1
          fi
          echo "✅ Все обязательные secrets настроены"

      - name: 🔑 Deploy via SSH (Bash only)
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_PORT: ${{ secrets.SERVER_PORT || '22' }}
        run: |
          echo "=== Развертывание на сервер ==="

          # Сохранить SSH ключ
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Отключить проверку хоста
          cat >> ~/.ssh/config << EOF
          Host deploy-server
            HostName $SERVER_HOST
            User $SERVER_USER
            Port $SERVER_PORT
            IdentityFile ~/.ssh/deploy_key
            StrictHostKeyChecking no
            UserKnownHostsFile=/dev/null
          EOF

          # Запустить update.sh на сервере
          echo "📦 Запуск обновления на сервере..."
          ssh -v deploy-server 'cd /app && bash ./update.sh' || {
            echo "❌ Ошибка при выполнении update.sh"
            exit 1
          }

          echo "✅ Развертывание завершено успешно"

      - name: 📊 Deployment Summary
        if: success()
        run: |
          echo "✅ DEPLOYMENT SUCCESSFUL"
          echo "Repository: ${{ github.repository }}"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"

      - name: ❌ Deployment Failed
        if: failure()
        run: |
          echo "❌ DEPLOYMENT FAILED"
          echo "Check SSH connection and update.sh script"
          exit 1
