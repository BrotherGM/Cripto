services:
  web:
    build: .
    container_name: cripto_web
    env_file: .env
    # Сеть хоста: контейнер обращается к Postgres по localhost
    # Подходит для Linux-сервера
    network_mode: "host"
    environment:
      - DB_HOST=localhost
    # gunicorn слушает порт 8077 прямо на хосте
    command: gunicorn cripto.wsgi:application --bind 0.0.0.0:8077 --workers 3 --timeout 120
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  worker:
    build: .
    container_name: cripto_worker
    env_file: .env
    network_mode: "host"
    environment:
      - DB_HOST=localhost
    command: python manage.py run_bots --interval 5 --reconcile-every 12
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
