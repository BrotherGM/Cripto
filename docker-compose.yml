services:
  web:
    build: .
    container_name: cripto_web
    env_file: .env
    # Сеть хоста: контейнер обращается к Postgres по localhost — так же, как
    # обычное приложение на сервере (как ваш рабочий karting). Не требует
    # перенастройки Postgres (listen_addresses/pg_hba). Подходит для Linux-сервера.
    network_mode: "host"
    environment:
      DB_HOST: localhost
    # gunicorn слушает порт 8077 прямо на хосте (при host-сети ports: не используется)
    command: gunicorn cripto.wsgi:application --bind 0.0.0.0:8077 --workers 3 --timeout 120
    restart: unless-stopped

  # Единый воркер-супервизор: держит торговые циклы всех стратегий, реагирует на
  # исполнения/стоп-лосс, сверяет БД с биржей. Единственный экземпляр гарантирует
  # advisory-lock внутри run_bots. Именно он приводит факт к desired_state, поэтому
  # веб можно перезапускать без потери состояния торговли.
  worker:
    build: .
    container_name: cripto_worker
    env_file: .env
    network_mode: "host"
    environment:
      DB_HOST: localhost
      APP_ROLE: worker      # не собирает статику/суперюзера; миграции — под общим advisory-lock
    command: python manage.py run_bots --interval 5 --reconcile-every 12
    restart: unless-stopped
    depends_on:
      - web
