version: '3.9'

services:
  # Django Web приложение
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cripto-web
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DB_NAME=cripto_prod
      - DB_USER=cripto
      - DB_PASSWORD=${DB_PASSWORD:-your-secure-password}
      - DB_HOST=172.17.0.1
      - DB_PORT=5432
      - TRADING_MODE=demo
      - OKX_API_KEY=${OKX_API_KEY}
      - OKX_API_SECRET=${OKX_API_SECRET}
      - OKX_PASSPHRASE=${OKX_PASSPHRASE}
      - OKX_FLAG=1
      - OKX_LIVE_API_KEY=${OKX_LIVE_API_KEY}
      - OKX_LIVE_API_SECRET=${OKX_LIVE_API_SECRET}
      - OKX_LIVE_PASSPHRASE=${OKX_LIVE_PASSPHRASE}
      - OKX_LIVE_FLAG=1
    ports:
      - "8077:8000"
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./logs:/app/logs
    networks:
      - cripto-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/admin/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Trading Worker
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cripto-worker
    command: sh -c "python manage.py run_bots --interval 5 --reconcile-every 12"
    environment:
      - DJANGO_DEBUG=False
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
      - DJANGO_ALLOWED_HOSTS=${DJANGO_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DB_NAME=cripto_prod
      - DB_USER=cripto
      - DB_PASSWORD=${DB_PASSWORD:-your-secure-password}
      - DB_HOST=172.17.0.1
      - DB_PORT=5432
      - TRADING_MODE=demo
      - OKX_API_KEY=${OKX_API_KEY}
      - OKX_API_SECRET=${OKX_API_SECRET}
      - OKX_PASSPHRASE=${OKX_PASSPHRASE}
      - OKX_FLAG=1
      - OKX_LIVE_API_KEY=${OKX_LIVE_API_KEY}
      - OKX_LIVE_API_SECRET=${OKX_LIVE_API_SECRET}
      - OKX_LIVE_PASSPHRASE=${OKX_LIVE_PASSPHRASE}
      - OKX_LIVE_FLAG=1
    depends_on:
      - web
    volumes:
      - ./logs:/app/logs
    networks:
      - cripto-network
    restart: unless-stopped

  # Nginx reverse proxy (опционально для production)
  # Для разработки используйте Django на порту 8077
  # nginx:
  #   image: nginx:alpine
  #   container_name: cripto-nginx
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./staticfiles:/app/staticfiles:ro
  #     - /etc/letsencrypt:/etc/letsencrypt:ro
  #   depends_on:
  #     - web
  #   networks:
  #     - cripto-network
  #   restart: unless-stopped

networks:
  cripto-network:
    driver: bridge
