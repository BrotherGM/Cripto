services:
  web:
    build: .
    container_name: cripto_web
    env_file: .env
    # PostgreSQL установлен на самом сервере (вне Docker).
    # Контейнер обращается к нему по адресу host.docker.internal -> хост.
    # DB_HOST переопределяем тут (в .env localhost — для запуска без Docker).
    environment:
      DB_HOST: host.docker.internal
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8077:8000"   # внешний порт 8077 -> gunicorn внутри контейнера (8000)
    restart: unless-stopped
