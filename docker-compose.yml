services:
  web:
    build: .
    container_name: cripto_web
    env_file: .env
    # Сеть хоста: контейнер обращается к Postgres по localhost
    # Подходит для Linux-сервера
    network_mode: "host"
    environment:
      - DB_HOST=localhost
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped

  worker:
    build: .
    container_name: cripto_worker
    env_file: .env
    network_mode: "host"
    environment:
      - DB_HOST=localhost
    command: ["python manage.py run_bots --interval 1 --reconcile-every 10"]
    volumes:
      - ./logs:/app/logs
    restart: unless-stopped
